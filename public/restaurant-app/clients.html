<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clients - Restaurant Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header identique aux autres pages -->
    <header class="header">
        <nav class="nav container">
            <div class="logo">🍽️ Restaurant Manager</div>
            <ul class="nav-links">
                <li><a href="index.html">Tableau de bord</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="clients.html">Clients</a></li>
                <li><a href="sales.html">Ventes</a></li>
                <li><a href="profile.html">Profil</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Gestion des Clients</h2>
                <button class="btn btn-primary" data-modal="addClientModal">+ Nouveau client</button>
            </div>
            <div class="form-group">
                <input type="text" id="clients-search" placeholder="Rechercher un client..." style="max-width: 300px;">
            </div>
            <div class="table-container">
                <table id="clients-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Commandes</th>
                            <th>Dépenses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Jean Dupont</td>
                            <td>jean@email.com</td>
                            <td>06 12 34 56 78</td>
                            <td>15</td>
                            <td>€245.50</td>
                            <td>
                                <button class="btn btn-warning" style="padding: 5px 10px;">🍽️</button>
                                <button class="btn btn-danger" style="padding: 5px 10px;">🍽️</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Modal Client -->
    <div id="addClientModal" class="modal" data-refresh="clients-table">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Nouveau client</h2>
            <form data-action="client" data-table="clients-table">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" name="fullname" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" name="phone">
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>setupSearch('clients-table');</script>
</body>
</html>
