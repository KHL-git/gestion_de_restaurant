<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Restaurant Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="logo" style="font-size: 2.5rem;">🍽️</div>
                <h2>Restaurant Manager</h2>
                <p>Connectez-vous à votre compte</p>
            </div>
            <form id="loginForm" data-action="login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="register.html" style="color: #667eea; text-decoration: none;">Pas de compte ? S'inscrire</a>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showNotification('Connexion réussie ! Redirection...', 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        });
    </script>
</body>
</html>
